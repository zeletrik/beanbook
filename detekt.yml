complexity:
  CyclomaticComplexMethod:
    allowedComplexity: 20
  LongMethod:
    allowedLines: 80
  LongParameterList:
    allowedFunctionParameters: 8
    allowedConstructorParameters: 8
  TooManyFunctions:
    allowedFunctionsPerClass: 20
    allowedFunctionsPerObject: 20
    allowedFunctionsPerFile: 30

style:
  MagicNumber:
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '10'
      - '100'
    ignorePropertyDeclaration: true
    ignoreAnnotation: true
    ignoreEnums: true
    ignoreLocalVariableDeclaration: true
    ignoreConstantDeclaration: true
  MaxLineLength:
    maxLineLength: 160
  WildcardImport:
    active: false
  ForbiddenComment:
    active: false
  ReturnCount:
    max: 4

naming:
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*|`[^`]+`'
  VariableNaming:
    variablePattern: '[a-z][A-Za-z0-9]*'
  ObjectPropertyNaming:
    propertyPattern: '[_A-Za-z][_A-Za-z0-9]*'

comments:
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false

exceptions:
  TooGenericExceptionCaught:
    active: false

performance:
  SpreadOperator:
    active: false
