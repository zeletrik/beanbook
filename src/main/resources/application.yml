server:
  port: 8001
---
# Spring
spring:
  threads:
    virtual:
      enabled: true
  application:
    name: bean-book
  datasource:
    url: jdbc:sqlite:${DATASOURCE_PATH:./beanbook.db}?journal_mode=WAL
    driver-class-name: org.sqlite.JDBC
    hikari:
      # Single connection serialises all SQLite access (it is a single-writer store). With virtual
      # threads a blocked writer must not wait Hikari's 30s default, and SQLite must wait for its own
      # lock rather than failing fast — hence the explicit timeouts + busy_timeout.
      maximum-pool-size: 1
      connection-timeout: 5000
      connection-init-sql: "PRAGMA busy_timeout=5000"
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

---
# Vaadin
vaadin:
  launch-browser: true

---
# AI-assisted bean entry — off by default (see docs/ai-bean-entry-scope.md).
# Enable with BEANBOOK_AI_ENABLED=true and supply OPENAI_API_KEY via the environment;
# the key is never baked into the image or committed.
beanbook:
  ai:
    enabled: ${BEANBOOK_AI_ENABLED:false}
    provider: openai
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: gpt-4o
