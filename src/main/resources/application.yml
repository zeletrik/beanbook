server:
  port: 8001
---
# Spring
spring:
  threads:
    virtual:
      enabled: true
  application:
    name: bean-book
  datasource:
    url: jdbc:sqlite:${DATASOURCE_PATH:./beanbook.db}?journal_mode=WAL
    driver-class-name: org.sqlite.JDBC
    hikari:
      # Single connection serialises all SQLite access (it is a single-writer store). With virtual
      # threads a blocked writer must not wait Hikari's 30s default, and SQLite must wait for its own
      # lock rather than failing fast — hence the explicit timeouts + busy_timeout.
      maximum-pool-size: 1
      connection-timeout: 5000
      connection-init-sql: "PRAGMA busy_timeout=5000"
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

---
# Vaadin
vaadin:
  launch-browser: true

---
# AI-assisted bean entry — off by default (see docs/ai-bean-entry-scope.md).
# Enable with BEANBOOK_AI_ENABLED=true. With provider=OPENAI supply OPENAI_API_KEY via the environment
# (never baked into the image); with provider=OLLAMA point base-url at your local Ollama server (no key).
beanbook:
  ai:
    enabled: ${BEANBOOK_AI_ENABLED:false}
    provider: ${BEANBOOK_AI_PROVIDER:OPENAI}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: GPT4o
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: GRANITE_VISION

---
# Optional authentication — off by default (loopback deployments need none). To expose the app beyond
# localhost: set BEANBOOK_SECURITY_ENABLED=true and supply BEANBOOK_AUTH_USERNAME / BEANBOOK_AUTH_PASSWORD
# via the environment (never baked into the image).
#
# Passkey (WebAuthn) login is available alongside the password whenever auth is enabled. Passkeys are
# origin-bound: the defaults suit loopback use, so when exposing the app set BEANBOOK_PASSKEY_RP_ID to
# the host (e.g. beans.example.com) and BEANBOOK_PASSKEY_ALLOWED_ORIGINS to the full origin(s)
# (comma-separated, e.g. https://beans.example.com).
beanbook:
  security:
    enabled: ${BEANBOOK_SECURITY_ENABLED:false}
    username: ${BEANBOOK_AUTH_USERNAME:}
    password: ${BEANBOOK_AUTH_PASSWORD:}
    passkey:
      rp-id: ${BEANBOOK_PASSKEY_RP_ID:localhost}
      rp-name: ${BEANBOOK_PASSKEY_RP_NAME:Bean Book}
      allowed-origins: ${BEANBOOK_PASSKEY_ALLOWED_ORIGINS:http://localhost:8001}
