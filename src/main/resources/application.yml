server:
  port: 8001
---
# Spring
spring:
  threads:
    virtual:
      enabled: true
  docker:
    compose:
      enabled: false
  application:
    name: bean-book
  datasource:
    url: jdbc:sqlite:./beanbook.db?journal_mode=WAL
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

---
# Vaadin
vaadin:
  launch-browser: true
