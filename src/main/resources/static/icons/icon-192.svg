<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Bean Book">
  <defs>
    <!-- Deepest velvet espresso-black radial background -->
    <radialGradient id="bgNeural" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1F110A"/>
      <stop offset="60%" stop-color="#0E0704"/>
      <stop offset="100%" stop-color="#050201"/>
    </radialGradient>

    <!-- Warm Organic Coffee Roast Gradient: Rich Amber to Deep Copper -->
    <linearGradient id="warmRoast" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="35%" stop-color="#F4A261"/>
      <stop offset="75%" stop-color="#E76F51"/>
      <stop offset="100%" stop-color="#9E4627"/>
    </linearGradient>

    <!-- Modern Futuristic AI Gradient: Royal Blue to Indigo/Violet -->
    <linearGradient id="aiTech" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="45%" stop-color="#1F75FE"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>

    <!-- AI Blue Glow Filter -->
    <filter id="blueGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Warm Golden Glow Filter -->
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Deep Drop Shadow for floating bean/book -->
    <filter id="layerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Base Rounded Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgNeural)"/>

  <!-- Left Side: Digital Cyber-Network (AI/Open-Source Identity) -->
  <g stroke="url(#aiTech)" fill="none" opacity="0.45" stroke-linecap="round">
    <!-- Concentric Neural Rings -->
    <circle cx="256" cy="256" r="215" stroke-width="1.5" stroke-dasharray="6, 12" />
    <circle cx="256" cy="256" r="165" stroke-width="1" stroke-dasharray="4, 8" />

    <!-- Precise Circuit tracks branching out from the left half of the bean -->
    <path d="M 170,240 L 90,210 L 50,235" stroke-width="2" />
    <path d="M 180,160 L 110,120 L 70,140" stroke-width="2" />
    <path d="M 180,320 L 110,360 L 80,345" stroke-width="2" />

    <!-- Glowing network nodes -->
    <circle cx="50" cy="235" r="4.5" fill="#1F75FE" filter="url(#blueGlow)" />
    <circle cx="70" cy="140" r="4.5" fill="#1F75FE" filter="url(#blueGlow)" />
    <circle cx="80" cy="345" r="4.5" fill="#1F75FE" filter="url(#blueGlow)" />
  </g>

  <!-- Right Side: Warm Sensory Aroma Waves (Coffee/Logging Identity) -->
  <g stroke="url(#warmRoast)" fill="none" opacity="0.45" stroke-linecap="round">
    <!-- Gentle, organic aroma/steam tracks rising from the right half of the bean -->
    <path d="M 342,240 C 390,250 420,210 462,225" stroke-width="2" />
    <path d="M 332,160 C 370,170 395,115 442,125" stroke-width="2" />
    <path d="M 332,320 C 380,330 405,370 432,360" stroke-width="2" />

    <!-- Glowing aroma nodes/points representing coffee notes -->
    <circle cx="462" cy="225" r="4.5" fill="#FFE066" filter="url(#goldGlow)" />
    <circle cx="442" cy="125" r="4.5" fill="#FFE066" filter="url(#goldGlow)" />
    <circle cx="432" cy="360" r="4.5" fill="#FFE066" filter="url(#goldGlow)" />
  </g>

  <!-- The Main Coffee Bean / Open Book Fusion -->
  <g filter="url(#layerShadow)" transform="translate(0, -10)">
    <!-- LEFT HALF: The AI & Open Source Page (Glowing Indigo & Blue) -->
    <path d="M 256,120 
             C 172,120 142,180 142,260 
             C 142,340 182,390 256,390 
             C 242,310 252,200 256,120 Z" 
          fill="url(#aiTech)" 
          opacity="0.95"/>

    <!-- LEFT PAGE DETAILS: High-contrast white/indigo code lines representing technical capability -->
    <g stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" opacity="0.8" fill="none">
      <path d="M 215,190 L 185,210 L 215,230"/>
      <path d="M 205,280 L 175,300 L 205,320"/>
    </g>

    <!-- RIGHT HALF: The Rich Roast & Ledger Page (Vibrant Amber & Copper) -->
    <path d="M 256,120 
             C 340,120 370,180 370,260 
             C 370,340 330,390 256,390 
             C 270,310 260,200 256,120 Z" 
          fill="url(#warmRoast)"/>

    <!-- RIGHT PAGE DETAILS: Warm ivory/gold ledger grid lines representing logging -->
    <g stroke="#FFFDF0" stroke-width="3.5" stroke-linecap="round" opacity="0.75" fill="none">
      <line x1="282" y1="200" x2="332" y2="200"/>
      <line x1="287" y1="230" x2="317" y2="230"/>
      <line x1="282" y1="280" x2="332" y2="280"/>
      <line x1="287" y1="310" x2="322" y2="310"/>
      <circle cx="332" cy="230" r="3" fill="#FFFDF0" opacity="0.9"/>
      <circle cx="337" cy="310" r="3" fill="#FFFDF0" opacity="0.9"/>
    </g>

    <!-- CENTER SEAM: The iconic wavy coffee bean split (Double-layered glow) -->
    <!-- Soft Blue Glow Behind Seam -->
    <path d="M 256,120 
             C 240,170 270,240 245,310 
             C 235,340 245,370 256,390" 
          fill="none" 
          stroke="#1F75FE" 
          stroke-width="12" 
          stroke-linecap="round"
          opacity="0.4"
          filter="url(#blueGlow)"/>

    <!-- Bright White Core of the split representing the light of intelligence and open book center -->
    <path d="M 256,120 
             C 240,170 270,240 245,310 
             C 235,340 245,370 256,390" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="7" 
          stroke-linecap="round"
          filter="url(#blueGlow)"/>
  </g>

  <!-- Bright Intelligent Spark / Node at the crown of the bean split, signifying AI capability -->
  <g transform="translate(256, 110)">
    <circle cx="0" cy="0" r="15" fill="#FFFFFF" filter="url(#blueGlow)"/>
    <path d="M -9,0 L 9,0 M 0,-9 L 0,9" stroke="#1F75FE" stroke-width="3.5" stroke-linecap="round"/>
  </g>
</svg>
