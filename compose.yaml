# Bean Book — homelab Docker deployment
#
# The database file lives on a named volume at /data/beanbook.db inside the container.
# SPRING_DATASOURCE_URL must point to that path; changing the value redeploys against a
# different file without any code change (AC-16, AC-17).
#
# Build the image first:
#   ./gradlew bootBuildImage --imageName=beanbook:latest
#
# Then start:
#   docker compose up -d

services:
  beanbook:
    image: beanbook:latest
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/data/beanbook.db?journal_mode=WAL
    volumes:
      - beanbook-data:/data

volumes:
  beanbook-data:
